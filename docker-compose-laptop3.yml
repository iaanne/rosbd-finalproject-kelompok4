services:
  # ==============================
  # LAPTOP 3 - Serving Layer
  # ==============================
  cassandra:
    image: cassandra:5.0
    container_name: cassandra-laptop3
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=BigDataCluster
    volumes:
      - cassandra-data:/var/lib/cassandra
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 15s
      timeout: 10s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.0
    container_name: elasticsearch-laptop3
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      interval: 15s
      timeout: 10s
      retries: 10

  fastapi:
    build: ./serving/fastapi
    container_name: fastapi-laptop3
    ports:
      - "8000:8000"
    depends_on:
      cassandra:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      - CASSANDRA_HOST=cassandra
      - ELASTICSEARCH_HOST=http://elasticsearch:9200
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-alert@dedolarisasi.com}
      - ALERT_EMAIL_BI=${ALERT_EMAIL_BI:-}
      - ALERT_EMAIL_INVESTOR=${ALERT_EMAIL_INVESTOR:-}
      - IDR_VOLATILITY_THRESHOLD=${IDR_VOLATILITY_THRESHOLD:-0.005}
    volumes:
      - ./serving/fastapi:/app

  streamlit:
    build: ./serving/streamlit
    container_name: streamlit-laptop3
    ports:
      - "8501:8501"
    depends_on:
      - fastapi
    environment:
      - API_BASE=http://fastapi:8000

volumes:
  cassandra-data:
  es-data:
