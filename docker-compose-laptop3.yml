services:
  # ==============================
  # LAPTOP 3 - Serving Layer
  # ==============================
  cassandra:
    image: cassandra:5.0
    container_name: cassandra-laptop3
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=BigDataCluster
    volumes:
      - cassandra-data:/var/lib/cassandra
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 15s
      timeout: 10s
      retries: 10

  cassandra-init:
    image: cassandra:5.0
    container_name: cassandra-init-laptop3
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./serving/init-cassandra.cql:/init.cql:ro
    command: ["cqlsh", "cassandra", "-f", "/init.cql"]
    restart: "no"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.0
    container_name: elasticsearch-laptop3
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      interval: 15s
      timeout: 10s
      retries: 10

  elasticsearch-init:
    image: curlimages/curl:latest
    container_name: es-init-laptop3
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./serving/init-elasticsearch.sh:/init-es.sh:ro
    command: ["sh", "/init-es.sh"]
    restart: "no"

  fastapi:
    build: ./serving/fastapi
    container_name: fastapi-laptop3
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      cassandra-init:
        condition: service_completed_successfully
      elasticsearch-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      - CASSANDRA_HOST=cassandra
      - ELASTICSEARCH_HOST=http://elasticsearch:9200
      - KAFKA_BOOTSTRAP_SERVERS=host.docker.internal:9092
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-alert@dedolarisasi.com}
      - ALERT_EMAIL_BI=${ALERT_EMAIL_BI:-}
      - ALERT_EMAIL_INVESTOR=${ALERT_EMAIL_INVESTOR:-}
      - IDR_VOLATILITY_THRESHOLD=${IDR_VOLATILITY_THRESHOLD:-0.005}
    volumes:
      - ./serving/fastapi:/app

  react:
    build: ./serving/react-dashboard
    container_name: react-laptop3
    ports:
      - "3000:3000"
    depends_on:
      fastapi:
        condition: service_healthy

volumes:
  cassandra-data:
  es-data:
