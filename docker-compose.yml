version: '3.8'

services:
  cassandra:
    image: cassandra:5.0
    container_name: cassandra-laptop3
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=BigDataCluster
    volumes:
      - cassandra-data:/var/lib/cassandra
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 15s
      timeout: 10s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.0
    container_name: elasticsearch-laptop3
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      interval: 15s
      timeout: 10s
      retries: 10

  fastapi:
    build: ./fastapi
    container_name: fastapi-laptop3
    ports:
      - "8000:8000"
    depends_on:
      cassandra:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      - CASSANDRA_HOST=cassandra
      - ELASTICSEARCH_HOST=http://elasticsearch:9200
    volumes:
      - ./fastapi:/app

  react:
    build: ./react-dashboard
    container_name: react-laptop3
    ports:
      - "3000:3000"
    depends_on:
      - fastapi
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - REACT_APP_WS_URL=ws://localhost:8000
    stdin_open: true

volumes:
  cassandra-data:
  es-data:
